<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creativity Playground — Visual Canvas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <header class="logo">
        <h1>Creativity</h1>
        <p>Playground</p>
      </header>

      <div class="controls-group">
        <h3>Brush</h3>
        <div class="brush-buttons">
          <button class="brush-btn active" data-brush="pen" title="Pen">✏️ Pen</button>
          <button class="brush-btn" data-brush="glow" title="Glow">✨ Glow</button>
          <button class="brush-btn" data-brush="spray" title="Spray">💨 Spray</button>
          <button class="brush-btn" data-brush="watercolor" title="Watercolor">🌊 Water</button>
          <button class="brush-btn" data-brush="calligraphy" title="Calligraphy">🖋 Calli</button>
          <button class="brush-btn" data-brush="eraser" title="Eraser">🗑 Erase</button>
        </div>
      </div>

      <div class="controls-group">
        <h3>Color</h3>
        <div class="color-palette">
          <input type="color" id="colorPicker" value="#ff6b6b" class="color-input" />
          <div class="quick-colors">
            <button class="color-btn" style="background: #ff6b6b" data-color="#ff6b6b"></button>
            <button class="color-btn" style="background: #ffd166" data-color="#ffd166"></button>
            <button class="color-btn" style="background: #06d6a0" data-color="#06d6a0"></button>
            <button class="color-btn" style="background: #4d96ff" data-color="#4d96ff"></button>
            <button class="color-btn" style="background: #b388ff" data-color="#b388ff"></button>
            <button class="color-btn" style="background: #ff9de2" data-color="#ff9de2"></button>
          </div>
        </div>
        <div class="harmony-suggestion">
          <button id="harmonyBtn" class="btn-small">🎨 Harmony</button>
          <div id="harmonyPalette" class="harmony-palette" hidden></div>
        </div>
      </div>

      <div class="controls-group">
        <h3>Size</h3>
        <input type="range" id="brushSize" min="2" max="50" value="8" class="slider" />
        <span id="sizeLabel">8px</span>
      </div>

      <div class="controls-group">
        <h3>Opacity</h3>
        <input type="range" id="opacity" min="0" max="100" value="100" class="slider" />
        <span id="opacityLabel">100%</span>
      </div>

      <div class="controls-group">
        <h3>Blend Mode</h3>
        <select id="blendMode" class="select-input">
          <option value="source-over">Normal</option>
          <option value="multiply">Multiply</option>
          <option value="screen">Screen</option>
          <option value="overlay">Overlay</option>
          <option value="lighten">Lighten</option>
          <option value="darken">Darken</option>
        </select>
      </div>

      <div class="controls-group">
        <h3>Effects</h3>
        <button id="particleToggle" class="btn-effect active">Particles: ON</button>
        <button id="smoothToggle" class="btn-effect">Smooth: ON</button>
        <button id="gridToggle" class="btn-effect">Grid: OFF</button>
      </div>

      <div class="controls-group">
        <h3>Edit</h3>
        <button id="undoBtn" class="btn-action">↶ Undo</button>
        <button id="redoBtn" class="btn-action">↷ Redo</button>
      </div>

      <div class="controls-group">
        <h3>Actions</h3>
        <button id="clearBtn" class="btn-action">Clear Canvas</button>
        <button id="downloadBtn" class="btn-action">Download</button>
        <button id="shortcutsBtn" class="btn-action">⌨ Shortcuts</button>
      </div>

      <footer class="sidebar-footer">
        <p>Draw freely.</p>
        <p>Create beauty.</p>
      </footer>
    </aside>

    <main class="workspace">
      <canvas id="canvas"></canvas>
      <div id="gridOverlay" class="grid-overlay" hidden></div>
      <div class="overlay-hint">Start drawing...</div>
    </main>

    <div id="shortcutsModal" class="modal" hidden>
      <div class="modal-content">
        <h2>Keyboard Shortcuts</h2>
        <div class="shortcuts-grid">
          <div><kbd>Z</kbd> Undo</div>
          <div><kbd>Shift+Z</kbd> Redo</div>
          <div><kbd>C</kbd> Clear</div>
          <div><kbd>G</kbd> Grid Toggle</div>
          <div><kbd>P</kbd> Pen Brush</div>
          <div><kbd>E</kbd> Eraser</div>
          <div><kbd>]</kbd> Increase Size</div>
          <div><kbd>[</kbd> Decrease Size</div>
          <div><kbd>D</kbd> Download</div>
          <div><kbd>Esc</kbd> Close Modal</div>
        </div>
        <button id="closeShortcuts" class="btn-action" style="margin-top: 12px;">Close</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
